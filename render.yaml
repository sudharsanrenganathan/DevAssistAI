# Render Blueprint for DevAssist AI
# ================================
# Deploy this by going to Render > New + > Blueprint
# and connecting your GitHub repository.

services:
  # 1. Java Spring Boot Backend
  - type: web
    name: devassist-backend
    runtime: docker
    dockerContext: backend/devassist-backend
    plan: free # Change to 'starter' if memory is an issue
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:6543/postgres
      - key: SPRING_DATASOURCE_USERNAME
        value: postgres.xovfufudevsqdmqxmyge
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false # Set this manually in Render dashboard
      - key: SUPABASE_JWT_SECRET
        sync: false # Set this manually in Render dashboard
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false # Set this manually in Render dashboard
      - key: AI_ENGINE_URL
        sync: false # Set this manually in Render dashboard

  # 2. Python AI Engine
  - type: web
    name: devassist-ai-engine
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.api_server:app --host 0.0.0.0 --port 10000
    rootDir: ai-engine
    envVars:
      - key: GROQ_API_KEY
        sync: false # Set this manually in Render dashboard
      - key: DATABASE_URL
        sync: false # Set this manually in Render dashboard
