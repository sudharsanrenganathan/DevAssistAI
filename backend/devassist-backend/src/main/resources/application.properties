server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-northeast-2.pooler.supabase.com:6543/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.xovfufudevsqdmqxmyge}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# HikariCP connection pool — stay within Supabase free tier limits
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ==================== FIX SUPABASE PGBOUNCER ====================
# Prevent 'prepared statement S_... already exists' errors in Transaction Mode pooler
spring.datasource.hikari.data-source-properties.prepareThreshold=0
# Prevent 'cannot execute INSERT in a read-only transaction' poisoning from Spring Data JPA
spring.datasource.hikari.data-source-properties.readOnlyMode=ignore

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Allow large file uploads (up to 100MB)
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ==================== SUPABASE AUTH CONFIG ====================
supabase.url=https://xovfufudevsqdmqxmyge.supabase.co
supabase.jwt-secret=${SUPABASE_JWT_SECRET}
supabase.key=${SUPABASE_SERVICE_ROLE_KEY}
supabase.anon-key=${SUPABASE_ANON_KEY}

# AI Engine URL (FastAPI)
# Priority: 1. ENV VAR, 2. Live production URL, 3. Localhost
ai.engine.url=${AI_ENGINE_URL:https://devassist-ai-engine.onrender.com}
